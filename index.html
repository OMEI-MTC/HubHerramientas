<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Herramientas · OGAME · MTC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #C8102E;
  --red-dk: #A00D24;
  --red-lt: #FBC9D1;
  --blue:   #0055A5;
  --blue-dk:#003F7D;
  --blue-lt:#EEF4FF;
  --white:  #ffffff;
  --bg:     #F2F2F2;
  --card:   #ffffff;
  --border: rgba(0,0,0,0.09);
  --text:   #1a1a1a;
  --text-2: #4a5568;
  --text-3: #8a9ab0;
  --sans: 'DM Sans', system-ui, sans-serif;
  --serif: 'DM Serif Display', serif;
  --r: 12px;
}
body { font-family:var(--sans); background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; min-height:100vh; }

/* ── Layout ── */
.layout { min-height:100vh; display:grid; grid-template-rows:auto 1fr; }
.main { padding:24px 28px; background:var(--bg); }

/* ── Topbar ── */
.topbar {
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  min-height: 100px;
}
.topbar-brand { display:flex; align-items:center; gap:14px; }
.topbar-logo { width:52px; height:52px; border-radius:8px; overflow:hidden; flex-shrink:0; box-shadow:0 1px 6px rgba(0,0,0,0.25); }
.topbar-logo img { width:100%; height:100%; object-fit:cover; display:block; }
.topbar-name { font-size:28px; font-weight:700; color:var(--white); line-height:1.2; letter-spacing:-0.01em; }
.topbar-sub  { font-size:14px; color:rgba(255,255,255,0.85); margin-top:3px; font-weight:400; }

/* Compartir en topbar */
.btn-share {
  display:flex; align-items:center; gap:7px;
  background:#003F7D;
  color:#fff;
  border:2px solid #003F7D;
  border-radius:24px;
  padding:8px 18px;
  font-family:var(--sans); font-size:13px; font-weight:600;
  cursor:pointer; white-space:nowrap;
  transition:background .12s, border-color .12s;
}
.btn-share:hover { background:#002D5C; border-color:#002D5C; }

/* ── Bienvenida ── */
.home-greeting { font-family:var(--serif); font-size:35px; color:var(--text); margin-bottom:2px; }
.home-sub-txt  { font-size:18px; color:var(--text-2); margin-bottom:16px; }

/* ── Toolbar buscador ── */
.toolbar { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.search-wrap { flex:1; display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--border); border-radius:24px; padding:7px 16px; }
.search-wrap svg { flex-shrink:0; }
.search-wrap input { border:none; outline:none; font-family:var(--sans); font-size:15px; color:var(--text); background:transparent; width:100%; }
.search-wrap input::placeholder { color:var(--text-3); }

/* ── Filtros ── */
.filters-bar { display:flex; align-items:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.filter-label { font-size:14px; font-weight:900; color:var(--text-3); letter-spacing:.05em; text-transform:uppercase; }
.filter-btn { font-size:14px; font-weight:800; padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:var(--white); color:var(--text-2); cursor:pointer; transition:all .12s; font-family:var(--sans); }
.filter-btn:hover { border-color:var(--red); color:var(--red); }
.filter-btn.active { background:var(--red); color:#fff; border-color:var(--red); }
.filter-count { margin-left:auto; font-size:15px; color:var(--text-3); font-weight:500; white-space:nowrap; }

/* ── Cards ── */
.module-list { display:flex; flex-direction:column; gap:14px; margin-bottom:20px; }
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: grid;
  grid-template-columns: 500px 1fr;
  transition: border-color .15s, box-shadow .15s;
}
.module-card:hover { border-color:rgba(200,16,46,0.25); box-shadow:0 3px 12px rgba(0,0,0,0.07); }

/* Columna izquierda */
.mc-left {
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 10px;
}
.mc-title {
  font-size: 32px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  line-height: 1.1;
  letter-spacing: -0.01em;
}
.mc-pills { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.pill-date {
  display: inline-flex; align-items:center; gap:5px;
  background: var(--blue-lt);
  color: var(--blue);
  font-size: 13px; font-weight:700;
  padding: 4px 12px; border-radius:20px;
}
.pill-freq {
  display: inline-flex;
  font-size: 11px; font-weight:500;
  color: #666;
  padding: 4px 12px; border-radius:20px;
  background: #E5E5E5;
}
.freshness { width:6px; height:6px; border-radius:50%; display:inline-block; }
.f-ok   { background:#22c55e; }
.f-warn { background:#f97316; }
.f-na   { background:#ccc; }

/* Columna derecha */
.mc-right { display:flex; flex-direction:column; }

/* Descripción arriba */
.mc-desc-wrap { padding:14px 16px; border-bottom:1px solid var(--border); }
.mc-desc {
  font-size: 16px; color: var(--text-2);
  background: var(--blue-lt);
  border-left: 3px solid var(--blue);
  padding: 8px 11px;
  border-radius: 0 5px 5px 0;
  line-height: 1.55;
}

/* KPIs en fila */
.mc-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
}
.mc-kpi { padding:12px 12px; border-right:1px solid var(--border); display:flex; align-items:center; gap:9px; }
.mc-kpi:last-child { border-right:none; }
.mc-kpi-icon { width:32px; height:32px; object-fit:contain; flex-shrink:0; }
.mc-kpi-val { font-size:24px; font-weight:700; color:var(--text); line-height:1.1; }
.mc-kpi-lbl { font-size:16px; color:var(--text-3); margin-top:2px; line-height:1.3; }

/* Botones abajo */
.mc-links { padding:10px 14px; display:flex; flex-wrap:wrap; gap:7px; }
.mc-btn { font-size:16px; font-weight:800; padding:6px 14px; border-radius:20px; border:1px solid var(--border); color:var(--text-2); cursor:pointer; background:var(--bg); font-family:var(--sans); text-decoration:none; display:inline-block; transition:background .12s, color .12s; }
.mc-btn:hover { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }
.mc-btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.mc-btn.primary:hover { background:var(--blue-dk); border-color:var(--blue-dk); }
.mc-btn.disabled { opacity:.4; cursor:default; pointer-events:none; }


/* ── Publicaciones ── */
.pub-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.pub-card:hover { border-color:rgba(0,85,165,0.3); box-shadow:0 3px 12px rgba(0,0,0,0.07); }
.pub-card-head {
  background: var(--navy, #0D2B4E);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.pub-card-head-left { display:flex; align-items:flex-start; gap:10px; }
.pub-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
.pub-nombre { font-size:14px; font-weight:600; color:var(--white); line-height:1.3; }
.pub-tipo { font-size:10px; color:rgba(255,255,255,0.7); margin-top:2px; }
.pub-badges { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.badge-estado {
  font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap;
}
.badge-publicado  { background:#dcfce7; color:#166534; }
.badge-preprint   { background:#fef9c3; color:#854d0e; }
.badge-proceso    { background:#dbeafe; color:#1e40af; }
.badge-default    { background:#f3f4f6; color:#374151; }
.pub-card-footer { padding:10px 14px; display:flex; justify-content:flex-end; border-top:1px solid var(--border); }

.pub-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* pub module-card override */
.module-card.pub-module {
  grid-template-columns: 1fr;
  display: block;
}
.module-card.pub-module .mc-left {
  border-right: none;
  border-bottom: 1px solid var(--border);
}


/* ── Evaluaciones agrupadas ── */
.eval-group { margin-bottom: 20px; }
.eval-group-title {
  font-size: 16px; font-weight: 600; color: var(--text-2);
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.eval-group-title::before {
  content: '';
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--blue); display: inline-block;
}
.eval-group-title.preprint::before { background: var(--amber, #BA7517); }
.eval-item {
  background: #1A4A7A;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  margin-bottom: 8px;
  gap: 16px;
  transition: background .12s;
}
.eval-item:hover { background: #245A92; }
.eval-item-left { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
.eval-item-icon { font-size:18px; flex-shrink:0; }
.eval-item-nombre { font-size:14px; font-weight:600; color:#fff; line-height:1.3; }
.eval-item-tipo   { font-size:11px; color:rgba(255,255,255,0.6); margin-top:2px; }
.eval-item-link {
  background: transparent; color: #fff;
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap; cursor: pointer;
  text-decoration: none; flex-shrink: 0;
  font-family: var(--sans);
  transition: background .12s, border-color .12s;
}
.eval-item-link:hover { background: rgba(255,255,255,0.15); border-color:#fff; }

/* ── Loading ── */
.hub-loading { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-3); padding:20px 0; }
.spin { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.debug-box { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:12px; font-size:11px; font-family:monospace; color:var(--text-2); margin-top:12px; white-space:pre-wrap; display:none; }
.no-results { font-size:13px; color:var(--text-3); padding:16px 0; display:none; }

/* ── Responsive ── */
@media (max-width:900px) {
  .module-card { grid-template-columns:1fr; }
  .mc-left { border-right:none; border-bottom:1px solid var(--border); }
  .mc-kpis { grid-template-columns:1fr 1fr; }
  .topbar { padding:12px 18px; min-height:auto; gap:10px; flex-wrap:wrap; }
  .main { padding:16px; }
}
</style>
</head>
<body>
<div class="layout">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo"><img src="mtc.jpg" alt="Logo MTC"></div>
      <div>
        <div class="topbar-name">Hub de Herramientas · OGAME</div>
        <div class="topbar-sub">Oficina General de Articulación, Monitoreo, y Evaluación de Impacto</div>
      </div>
    </div>
    <button class="btn-share" onclick="shareHub()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      <span id="shareLabel">Compartir enlace</span>
    </button>
  </header>

  <main class="main">
    <div class="home-greeting">Bienvenida/o</div>
    <div id="homeLoadingMsg">
      <span class="hub-loading"><span class="spin"></span> Cargando configuración desde Google Sheets…</span>
    </div>

    <div id="homeContent" style="display:none">
      <div class="home-sub-txt">Selecciona una herramienta para acceder a la información.</div>

      <div class="toolbar">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8a9ab0" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="searchInput" type="text" placeholder='Buscar por nombre, descripción o categoría — p. ej. "hitos", "departamental", "CER"...' oninput="applyFilters()">
        </div>
      </div>

      <div class="filters-bar" id="filtersBar">
        <span class="filter-label">Filtrar:</span>
        <button class="filter-btn active" onclick="setFilter('TODAS',this)">Todas</button>
        <span id="filterBtns"></span>
        <span class="filter-count" id="filterCount"></span>
      </div>

      <div class="no-results" id="noResults">No se encontraron herramientas para esa búsqueda.</div>
      <div class="module-list" id="moduleList"></div>
    </div>

    <div class="debug-box" id="debugBox"></div>
  </main>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkXT9qu8x5JInu81VZ3BDkQ338o6gix4h4CBRTL7q6UeL7NsWn0MvvRlMA474WwH4xIy0LSlPQT-A7/pub?gid=766760814&single=true&output=tsv';
const PROXIES = [
  u => u,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
];

let DATA = { config:[], links:[], kpis:[], publicaciones:[] };
const PUB_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkXT9qu8x5JInu81VZ3BDkQ338o6gix4h4CBRTL7q6UeL7NsWn0MvvRlMA474WwH4xIy0LSlPQT-A7/pub?gid=505119670&single=true&output=tsv';
let activeFilter = 'TODAS';

async function loadSheet() {
  let lastErr = null;
  for (const proxyFn of PROXIES) {
    try {
      const url = proxyFn(SHEET_URL);
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 9000);
      const res = await fetch(url, { cache:'no-store', signal:ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (!text || text.length < 20) throw new Error('Respuesta vacía');
      debug('RAW:\n' + text.substring(0,300));
      parseSheet(text);
      buildUI();
      return;
    } catch(e) { lastErr = e; debug('Proxy falló: ' + e.message); }
  }
  document.getElementById('homeLoadingMsg').innerHTML =
    `<span style="color:#C8102E;font-size:13px;">⚠ No se pudo cargar el Sheet.<br><small>Error: ${lastErr?.message}</small></span>`;
}

function parseSheet(raw) {
  DATA = { config:[], links:[], kpis:[], publicaciones:[] };
  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let mode = null;
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = line.split('\t').map(c=>(c||'').trim());
    const [c1,c2,c3,c4,c5,c6] = cols;
    if (c1==='Configuración'||c1==='Enlaces'||c1==='KPIs') { mode=null; continue; }
    if (c1==='Sección'&&c2==='Descripción')  { mode='config'; continue; }
    if (c1==='Sección'&&c2==='Herramientas') { mode='links';  continue; }
    if (c1==='Sección'&&c2==='Variable')     { mode='kpis';   continue; }
    if (!c1||!mode) continue;
    if (mode==='config') DATA.config.push({ seccion:c1, descripcion:c2||'', periodicidad:c3||'No aplica', corte:c4||'', equipo:c5||'', etiqueta:c6||'' });
    if (mode==='links')  DATA.links.push({ seccion:c1, herramienta:c2||'', url:c3||'' });
    if (mode==='kpis')   DATA.kpis.push({ seccion:c1, variable:c2||'', valor:c3||'', unidad:c4||'' });
  }
  debug(`Parsed → config:${DATA.config.length} links:${DATA.links.length} kpis:${DATA.kpis.length}`);
}

async function buildUI() {
  document.getElementById('homeLoadingMsg').style.display = 'none';
  document.getElementById('homeContent').style.display = 'block';
  if (DATA.config.length === 0) {
    document.getElementById('moduleList').innerHTML = '<p style="color:#C8102E;font-size:13px;">⚠ Se cargó el Sheet pero no se encontraron datos.</p>';
    document.getElementById('debugBox').style.display = 'block';
    return;
  }
  await loadPublicaciones();
  buildFilterBtns();
  renderCards();
}

async function loadPublicaciones() {
  try {
    const proxies = [
      u => u,
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
    ];
    for (const proxyFn of proxies) {
      try {
        const res = await fetch(proxyFn(PUB_SHEET_URL), { cache:'no-store' });
        if (!res.ok) continue;
        const text = await res.text();
        parsePublicaciones(text);
        return;
      } catch(e) { continue; }
    }
  } catch(e) { debug('Pub error: ' + e.message); }
}

function parsePublicaciones(raw) {
  DATA.publicaciones = [];
  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  // Skip header row
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // CSV parse (simple — handles quoted fields)
    const cols = line.split('\t').map(c=>(c||'').trim());
    const [num, nombre, tipo, estado, enlace] = cols;
    if (!nombre) continue;
    DATA.publicaciones.push({ num:num||'', nombre:nombre||'', tipo:tipo||'', estado:estado||'', enlace:enlace||'' });
  }
  debug('Publicaciones cargadas: ' + DATA.publicaciones.length);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function buildFilterBtns() {
  const etiquetas = [...new Set(DATA.config.map(c=>c.etiqueta).filter(Boolean))];
  const equipos   = [...new Set(DATA.config.map(c=>c.equipo).filter(Boolean))];
  const all = [...new Set([...etiquetas, ...equipos])];
  document.getElementById('filterBtns').innerHTML = all.map(f =>
    `<button class="filter-btn" onclick="setFilter('${f}',this)">${f}</button>`
  ).join('');
}

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const cards = document.querySelectorAll('.module-card');
  let visible = 0;
  cards.forEach(card => {
    const matchFilter = activeFilter==='TODAS' ||
      (card.dataset.etiqueta||'').toUpperCase()===activeFilter.toUpperCase() ||
      (card.dataset.equipo||'').toUpperCase()===activeFilter.toUpperCase();
    const matchSearch = !q || card.textContent.toLowerCase().includes(q);
    const show = matchFilter && matchSearch;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const total = DATA.config.length;
  document.getElementById('filterCount').textContent =
    `${visible < total ? visible+' de ':'' }${total} herramienta${total!==1?'s':''}`;
  document.getElementById('noResults').style.display = (visible===0) ? 'block' : 'none';
}

function renderCards() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  DATA.config.forEach(cfg => {
    const kpis  = DATA.kpis.filter(k=>k.seccion===cfg.seccion);
    const links = DATA.links.filter(l=>l.seccion===cfg.seccion);
    const fresh = getFreshness(cfg);

    const showCorte = cfg.corte && cfg.corte !== '';
    const showFreq  = cfg.periodicidad && cfg.periodicidad !== 'No aplica';
    const pillsHtml = `
      <div class="mc-pills">
        ${showCorte ? `<span class="pill-date">${formatCorte(cfg.corte)}</span>` : ''}
        ${showFreq  ? `<span class="pill-freq">${cfg.periodicidad}</span>` : ''}
      </div>`;

    const kpiHtml = kpis.length ? `
      <div class="mc-kpis">
        ${kpis.slice(0,4).map(k=>`
          <div class="mc-kpi">
            <img class="mc-kpi-icon" src="${kpiIcon(k.variable)}" alt="" onerror="this.style.display='none'">
            <div><div class="mc-kpi-val">${fmtVal(k.valor,k.unidad)}</div><div class="mc-kpi-lbl">${k.variable}</div></div>
          </div>`).join('')}
      </div>` : '';

    const linksHtml = links.map(l => {
      const pending = !l.url || l.url.toLowerCase()==='pendiente';
      const primary = /tablero|visor/i.test(l.herramienta);
      if (pending) return `<span class="mc-btn disabled">${l.herramienta}</span>`;
      return `<a class="mc-btn${primary?' primary':''}" href="${l.url}" target="_blank" rel="noopener">${l.herramienta} ↗</a>`;
    }).join('');

    const card = document.createElement('div');
    card.dataset.etiqueta = cfg.etiqueta || '';
    card.dataset.equipo   = cfg.equipo   || '';

    // Evaluaciones: agrupadas por estado
    if (cfg.seccion === 'Evaluaciones' || cfg.seccion === 'Publicaciones') {
      card.className = 'module-card pub-module';

      // Group by estado
      const grupos = {};
      DATA.publicaciones.forEach(p => {
        const key = p.estado || 'Otro';
        if (!grupos[key]) grupos[key] = [];
        grupos[key].push(p);
      });

      const gruposHtml = Object.keys(grupos).map(estado => `
        <div class="eval-group">
          <div class="eval-group-title ${estado.toLowerCase().includes('pre') ? 'preprint' : ''}">${estado}</div>
          ${grupos[estado].map(p => `
            <div class="eval-item">
              <div class="eval-item-left">
                <span class="eval-item-icon">📄</span>
                <div>
                  <div class="eval-item-nombre">${p.nombre}</div>
                  <div class="eval-item-tipo">${p.tipo}</div>
                </div>
              </div>
              ${p.enlace ? `<a class="eval-item-link" href="${p.enlace}" target="_blank" rel="noopener">Ver publicación ↗</a>` : ''}
            </div>`).join('')}
        </div>`).join('');

      const evalContent = DATA.publicaciones.length
        ? gruposHtml
        : '<p style="font-size:12px;color:var(--text-3);padding:8px 0;">Cargando evaluaciones…</p>';

      card.innerHTML = `
        <div class="mc-left">
          <div class="mc-title">${cfg.seccion === "Publicaciones" ? "Evaluaciones" : cfg.seccion}</div>
          ${pillsHtml}
        </div>
        <div style="padding:16px;">
          ${cfg.descripcion ? `<div class="mc-desc-wrap" style="margin-bottom:16px;padding:0;"><div class="mc-desc">${cfg.descripcion}</div></div>` : ''}
          ${evalContent}
        </div>`;
    } else {
      card.className = 'module-card';
      card.innerHTML = `
        <div class="mc-left">
          <div class="mc-title">${cfg.seccion}</div>
          ${pillsHtml}
        </div>
        <div class="mc-right">
          ${cfg.descripcion ? `<div class="mc-desc-wrap"><div class="mc-desc">${cfg.descripcion}</div></div>` : ''}
          ${kpiHtml}
          <div class="mc-links">${linksHtml||'<span style="font-size:11px;color:var(--text-3)">Sin enlaces configurados</span>'}</div>
        </div>`;
    }
    list.appendChild(card);
  });

  const total = DATA.config.length;
  document.getElementById('filterCount').textContent = `${total} herramienta${total!==1?'s':''}`;
}

function getFreshness(cfg) {
  if (!cfg.corte||cfg.periodicidad==='No aplica') return 'na';
  const days = {'Semanal':7,'Quincenal':15,'Mensual':31};
  const limit = days[cfg.periodicidad];
  if (!limit) return 'na';
  const parts = cfg.corte.match(/(\d{1,2})[-\/](\w+)[-\/]?(\d{0,4})/);
  if (!parts) return 'na';
  const months = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const d = parseInt(parts[1]);
  const mRaw = parts[2].toLowerCase();
  const m = months[mRaw]!==undefined ? months[mRaw] : parseInt(mRaw)-1;
  let y = parts[3] ? parseInt(parts[3]) : new Date().getFullYear();
  if (y < 100) y += 2000;
  return (Date.now()-new Date(y,m,d).getTime())/86400000 <= limit ? 'ok' : 'warn';
}

function formatCorte(corte) {
  if (!corte) return '';
  const s = corte.match(/^(\d{1,2})[-\/](\w{3,})$/);
  if (s) return s[1]+'-'+s[2].toLowerCase()+'-'+new Date().getFullYear();
  const f = corte.match(/^(\d{1,2})[-\/](\w+)[-\/](\d{2,4})$/);
  if (f) { let y=parseInt(f[3]); if(y<100)y+=2000; return f[1]+'-'+f[2].toLowerCase()+'-'+y; }
  return corte;
}

function kpiIcon(v) {
  const s=(v||'').toLowerCase();
  if (s.includes('hitos vigentes'))   return 'Total.png';
  if (s.includes('hitos culminados')) return 'culminados.png';
  if (s.includes('a/c vigentes'))     return 'vigentes cumplidos.png';
  if (s.includes('culminados'))       return 'vigentes cumplidos.png';
  if (s.includes('hito'))             return 'hito.png';
  if (s.includes('intervencion'))     return 'intervenciones.png';
  if (s.includes('invers'))           return 'inversion.png';
  if (s.includes('avance'))           return 'avance.png';
  if (s.includes('proyecto'))         return 'proyectos1.png';
  if (s.includes('servicio'))         return 'servicios1.png';
  if (s.includes('acuerdos'))         return 'acuerdos.png';
  return 'avance.png';
}

function badgeClass(estado) {
  const s = (estado||'').toLowerCase();
  if (s.includes('publicado')) return 'badge-publicado';
  if (s.includes('pre-print') || s.includes('preprint')) return 'badge-preprint';
  if (s.includes('proceso') || s.includes('progreso')) return 'badge-proceso';
  return 'badge-default';
}

function fmtVal(val,unit) {
  if (!val) return '—';
  const n = parseFloat(val.toString().replace(',','.'));
  if (isNaN(n)) return val;
  if ((unit||'').toLowerCase().includes('porcentaje')) { const p=n>1?n:n*100; return p.toFixed(1)+'%'; }
  if (n>=1000000) return (n/1000000).toFixed(1)+'M';
  if (n>=1000) return n.toLocaleString('en-US').replace(/,/g,' ');
  return n.toFixed(n%1===0?0:1);
}

function shareHub() {
  const label = document.getElementById('shareLabel');
  navigator.clipboard.writeText(window.location.href).then(()=>{
    label.textContent='¡Enlace copiado!';
    setTimeout(()=>{ label.textContent='Compartir enlace'; },2500);
  }).catch(()=>{ prompt('Copia este enlace:',window.location.href); });
}

function debug(msg) { document.getElementById('debugBox').textContent += msg+'\n'; }

loadSheet();
