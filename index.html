<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Herramientas · OMEI · MTC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
/* =========================================================
   01. VARIABLES, RESET Y BASE
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0D2B4E;
  --teal: #1D9E75;
  --teal-dk: #0F6E56;
  --white: #ffffff;
  --bg: #F4F6F9;
  --card: #ffffff;
  --border: rgba(0,0,0,0.10);
  --text: #1a1a2e;
  --text-2: #4a5568;
  --text-3: #8a9ab0;
  --blue-muted: #7FB3D3;
  --sans: 'DM Sans', system-ui, sans-serif;
  --serif: 'DM Serif Display', serif;
  --radius-lg: 14px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* =========================================================
   02. LAYOUT GENERAL SIN MENÚ LATERAL
   ========================================================= */
.layout {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 88px 1fr;
}

.main {
  padding: 28px;
  background: var(--bg);
}

/* =========================================================
   03. TOPBAR
   ========================================================= */
.topbar {
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 4px solid var(--teal);
  min-height: 88px;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.topbar-logo {
  width: 58px;
  height: 58px;
  background: var(--white);
  border: none;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  cursor: pointer;
  overflow: hidden;
  padding: 0;
}

.topbar-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.topbar-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.15;
}

.topbar-sub {
  font-size: 14px;
  color: var(--white);
  margin-top: 5px;
  line-height: 1.35;
  font-weight: 500;
}

.topbar-date {
  text-align: right;
  font-size: 12px;
  color: var(--blue-muted);
  line-height: 1.5;
}

.topbar-date strong {
  display: block;
  color: var(--white);
  font-size: 14px;
  font-weight: 700;
}

/* =========================================================
   04. HOME Y SECCIONES
   ========================================================= */
.home-greeting {
  font-family: var(--serif);
  font-size: 32px;
  color: var(--text);
  margin-bottom: 4px;
}

.home-sub {
  font-size: 14px;
  color: var(--text-2);
  margin-bottom: 22px;
}

.module-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 22px;
}

.section-lbl {
  grid-column: 1 / -1;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 10px 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-lbl::after {
  content: '';
  flex: 1;
  height: .5px;
  background: var(--border);
}

/* =========================================================
   05. TARJETAS
   ========================================================= */
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.mc-head {
  background: var(--navy);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.mc-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.25;
}

.mc-resp {
  font-size: 12px;
  color: var(--blue-muted);
  margin-top: 3px;
}

.mc-date-pills {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.date-pill {
  background: var(--teal);
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 999px;
  white-space: nowrap;
}

.period-pill {
  background: var(--white);
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 999px;
  white-space: nowrap;
}

.mc-kpis {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.mc-kpi {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
  display: grid;
  grid-template-columns: 52px 1fr;
  align-items: center;
  gap: 12px;
}

.mc-kpi:nth-child(even) { border-right: none; }
.mc-kpi:nth-child(n+3) { border-top: 1px solid var(--border); }

.mc-kpi-icon {
  width: 44px;
  height: 44px;
  object-fit: contain;
  display: block;
}

.mc-kpi-val {
  font-size: 25px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.15;
}

.mc-kpi-lbl {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 3px;
}

.mc-body { padding: 16px; }
.mc-desc { font-size: 13px; color: var(--text-2); }

.mc-links {
  padding: 10px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  border-top: 1px solid var(--border);
}

.mc-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-2);
  cursor: pointer;
  background: var(--bg);
  font-family: var(--sans);
  text-decoration: none;
  display: inline-block;
  transition: background .12s, color .12s, border-color .12s;
}

.mc-btn:hover {
  background: var(--navy);
  color: var(--white);
  border-color: var(--navy);
}

.mc-btn.primary {
  background: var(--teal);
  color: var(--white);
  border-color: var(--teal);
}

.mc-btn.primary:hover {
  background: var(--teal-dk);
  border-color: var(--teal-dk);
}

/* =========================================================
   06. CARGA Y RESPONSIVE
   ========================================================= */
.hub-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--text-3);
  padding: 20px 0;
}

.spin {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) {
  .module-grid { grid-template-columns: 1fr; }
  .topbar { align-items: flex-start; padding: 14px 18px; height: auto; gap: 12px; }
  .topbar-date { display: none; }
  .topbar-name { font-size: 19px; }
  .topbar-sub { font-size: 12px; }
  .main { padding: 20px; }
}
</style>
</head>

<body>
<div class="layout">

  <!-- =====================================================
       07. TOPBAR / ENCABEZADO
       ===================================================== -->
  <header class="topbar">
    <div class="topbar-brand">
      <button class="topbar-logo" onclick="goHome()" title="Volver a la portada">
        <img src="mtc.jpg" alt="Logo MTC">
      </button>
      <div>
        <div class="topbar-name">Hub de Herramientas · OMEI</div>
        <div class="topbar-sub">
          Oficina General de Articulación, Monitoreo, y Evaluación de Impacto (OGAME)<br>
          Ministerio de Transporte y Comunicaciones
        </div>
      </div>
    </div>
    <div class="topbar-date">
      <strong id="topDate">—</strong>
      OMEI · OGAME · MTC
    </div>
  </header>

  <!-- =====================================================
       08. CONTENIDO PRINCIPAL
       ===================================================== -->
  <main class="main" id="mainArea">
    <div class="home-greeting">Bienvenida/o</div>
    <div class="home-sub" id="homeLoadingMsg">
      <span class="hub-loading"><span class="spin"></span> Cargando configuración desde Google Sheets…</span>
    </div>

    <div id="homeContent" style="display:none">
      <div class="home-sub">Selecciona una herramienta o repositorio para acceder a la información.</div>
      <div class="module-grid" id="moduleGrid"></div>
    </div>
  </main>

</div>

<script>
/* =========================================================
   09. CONFIGURACIÓN GENERAL
   ========================================================= */
const SHEET_URL_DIRECT = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkXT9qu8x5JInu81VZ3BDkQ338o6gix4h4CBRTL7q6UeL7NsWn0MvvRlMA474WwH4xIy0LSlPQT-A7/pub?gid=766760814&single=true&output=tsv';

const CORS_PROXIES = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

let DATA = { config: [], links: [], kpis: [] };

document.getElementById('topDate').textContent = new Date().toLocaleDateString('es-PE', {
  day: '2-digit',
  month: 'short',
  year: 'numeric'
});

loadSheet();

/* =========================================================
   10. CARGA DE DATOS DESDE GOOGLE SHEETS
   ========================================================= */
async function loadSheet() {
  let lastError = null;

  for (const proxyFn of CORS_PROXIES) {
    try {
      const url = proxyFn(SHEET_URL_DIRECT);
      const res = await fetchWithTimeout(url, 9000);

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const text = await res.text();
      if (!text || text.length < 10) throw new Error('Respuesta vacía');

      parseSheet(text);
      buildUI();
      return;
    } catch (e) {
      lastError = e;
    }
  }

  document.getElementById('homeLoadingMsg').innerHTML = `
    <span style="color:#C8102E;font-size:13px;">
      ⚠ No se pudo cargar la configuración desde Google Sheets.<br>
      <small>Verifica que el Sheet esté publicado en la web como TSV.<br>
      Error: ${lastError?.message || 'desconocido'}</small>
    </span>`;
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);

  return fetch(url, { cache: 'no-store', signal: controller.signal })
    .finally(() => clearTimeout(timeout));
}

/* =========================================================
   11. LECTURA DE LAS 3 TABLAS DEL EXCEL PUBLICADO
   ========================================================= */
function parseSheet(text) {
  DATA = { config: [], links: [], kpis: [] };

  const rows = text
    .replace(/
/g, '')
    .split('
')
    .map(r => r.split('	').map(c => (c || '').trim()));

  let mode = null;

  for (const row of rows) {
    const c1 = row[0];
    const c2 = row[1];
    const c3 = row[2];
    const c4 = row[3];
    const c5 = row[4];
    const c6 = row[5];

    if (c1 === 'Sección' && c2 === 'Descripción' && c3 === 'Periodicidad' && c4 === 'Responsable' && c5 === 'Correo') {
      mode = 'config';
      continue;
    }

    if (c1 === 'Sección' && c2 === 'Herramientas' && c3 === 'Enlaces') {
      mode = 'links';
      continue;
    }

    if (c1 === 'Sección' && c2 === 'Variable' && c3 === 'Valor' && c4 === 'Unidad') {
      mode = 'kpis';
      continue;
    }

    if (!c1) continue;

    if (mode === 'config') {
      DATA.config.push({
        seccion: c1,
        descripcion: c2 || 'Sin descripción',
        periodicidad: c3 || 'No aplica',
        responsable: c4 || 'No asignado',
        correo: c5 || '',
        corte: c6 || ''
      });
    }

    if (mode === 'links') {
      DATA.links.push({
        seccion: c1,
        herramienta: c2 || 'Herramienta',
        url: c3 || ''
      });
    }

    if (mode === 'kpis') {
      DATA.kpis.push({
        seccion: c1,
        variable: c2 || 'Indicador',
        valor: c3 || '',
        unidad: c4 || ''
      });
    }
  }
}

/* =========================================================
   12. CONSTRUCCIÓN DEL HOME
   ========================================================= */
function buildUI() {
  document.getElementById('homeLoadingMsg').style.display = 'none';
  document.getElementById('homeContent').style.display = 'block';

  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = '';

  const herramientas = DATA.config.filter(cfg => cfg.seccion !== 'Publicaciones');
  const otros = DATA.config.filter(cfg => cfg.seccion === 'Publicaciones');

  renderHomeGroup('Herramientas', herramientas, grid);
  renderHomeGroup('Otros', otros, grid);
}

function renderHomeGroup(title, items, container) {
  if (!items || items.length === 0) return;

  container.innerHTML += `<div class="section-lbl">${title}</div>`;

  items.forEach(cfg => {
    const kpis = DATA.kpis.filter(k => k.seccion === cfg.seccion);
    const links = DATA.links.filter(l => l.seccion === cfg.seccion);
    const hasKpis = kpis.length > 0;

    const kpiHtml = hasKpis ? `
      <div class="mc-kpis">
        ${kpis.slice(0, 4).map(k => `
          <div class="mc-kpi">
            <img class="mc-kpi-icon" src="${getKpiIcon(k.variable)}" alt="${k.variable}" onerror="this.style.display='none'">
            <div>
              <div class="mc-kpi-val">${formatVal(k.valor, k.unidad)}</div>
              <div class="mc-kpi-lbl">${k.variable}</div>
            </div>
          </div>
        `).join('')}
      </div>` : '';

    const linksHtml = renderLinksButtons(links);

    const corteHtml = cfg.seccion !== 'Publicaciones' ? `
      <div class="mc-date-pills">
        <span class="date-pill">${cfg.corte || 'Sin corte'}</span>
        <span class="period-pill">${cfg.periodicidad || 'No aplica'}</span>
      </div>` : '';

    container.innerHTML += `
      <div class="module-card">
        <div class="mc-head">
          <div>
            <div class="mc-title">${cfg.seccion}</div>
            <div class="mc-resp">Responsable: ${cfg.responsable}<br>Correo: ${cfg.correo}</div>
          </div>
          <div>${corteHtml}</div>
        </div>
        ${hasKpis ? kpiHtml : `<div class="mc-body"><div class="mc-desc">${cfg.descripcion}</div></div>`}
        <div class="mc-links">${linksHtml}</div>
      </div>`;
  });
}

/* =========================================================
   13. BOTONES / ENLACES
   ========================================================= */
function renderLinksButtons(links) {
  return links.map(l => {
    const isPending = !l.url || l.url.toLowerCase() === 'pendiente';
    const isPrimary = l.herramienta.toLowerCase().includes('tablero') || l.herramienta.toLowerCase().includes('visor');

    if (isPending) {
      return `<span class="mc-btn" title="Próximamente">${l.herramienta}</span>`;
    }

    return `
      <a class="mc-btn${isPrimary ? ' primary' : ''}"
         href="${l.url}"
         target="_blank"
         rel="noopener">
        ${l.herramienta} ↗
      </a>`;
  }).join('');
}

/* =========================================================
   14. FUNCIONES AUXILIARES
   ========================================================= */
function goHome() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getKpiIcon(variable) {
  const v = (variable || '').toLowerCase();

  if (v.includes('intervencion')) return 'intervenciones.png';
  if (v.includes('hito')) return 'hito.png';
  if (v.includes('invers')) return 'inversion.png';
  if (v.includes('avance')) return 'avance.png';

  return 'avance.png';
}

function formatVal(val, unit) {
  if (!val) return '—';

  const clean = val.toString().replace(/,/g, '.');
  const n = parseFloat(clean);

  if (isNaN(n)) return val;

  if (unit && unit.toLowerCase().includes('porcentaje')) {
    return (n > 1 ? n : n * 100).toFixed(1).replace('.', ',') + '%';
  }

  if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.', ',') + ' M';
  if (n >= 1000) return n.toLocaleString('es-PE');

  return n.toLocaleString('es-PE');
}
</script>
</body>
</html>
