<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Herramientas · OGAME · MTC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0D2B4E; --teal:#1D9E75; --teal-dk:#0F6E56;
  --white:#fff; --bg:#F4F6F9; --card:#fff;
  --border:rgba(0,0,0,0.10); --text:#1a1a2e;
  --text-2:#4a5568; --text-3:#8a9ab0;
  --blue-muted:#7FB3D3; --red:#C8102E; --amber:#BA7517;
  --sans:'DM Sans',system-ui,sans-serif;
  --serif:'DM Serif Display',serif;
  --r:14px;
}
body { font-family:var(--sans); background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; min-height:100vh; }

.layout { min-height:100vh; display:grid; grid-template-rows:80px 1fr; }
.main { padding:28px; background:var(--bg); }

/* Topbar */
.topbar { background:var(--navy); display:flex; align-items:center; justify-content:space-between; padding:0 28px; border-bottom:4px solid var(--teal); min-height:80px; }
.topbar-brand { display:flex; align-items:center; gap:14px; }
.topbar-logo { width:54px; height:54px; background:var(--white); border-radius:8px; overflow:hidden; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.25); }
.topbar-logo img { width:100%; height:100%; object-fit:cover; display:block; }
.topbar-name { font-size:20px; font-weight:700; color:var(--white); line-height:1.2; }
.topbar-sub { font-size:12px; color:var(--blue-muted); margin-top:3px; }
.topbar-date { text-align:right; font-size:11px; color:var(--blue-muted); }
.topbar-date strong { display:block; color:var(--white); font-size:13px; font-weight:600; }

/* Home */
.home-greeting { font-family:var(--serif); font-size:28px; color:var(--text); margin-bottom:4px; }
.home-sub { font-size:13px; color:var(--text-2); margin-bottom:20px; }
.module-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
.section-lbl { grid-column:1/-1; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-3); margin:10px 0 4px; display:flex; align-items:center; gap:8px; }
.section-lbl::after { content:''; flex:1; height:.5px; background:var(--border); }

/* Cards */
.module-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; transition:border-color .15s, transform .1s; }
.module-card:hover { border-color:rgba(29,158,117,0.4); transform:translateY(-1px); }
.mc-head { background:var(--navy); padding:12px 15px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.mc-title { font-size:18px; font-weight:700; color:var(--white); line-height:1.25; }
.mc-resp { font-size:12px; color:var(--blue-muted); margin-top:3px; }
.mc-pills { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.pill-date { background:var(--teal); color:var(--white); font-size:15px; font-weight:600; padding:6px 14px; border-radius:20px; white-space:nowrap; display:flex; align-items:center; gap:5px; }
.pill-freq { font-size:10px; font-weight:500; padding:2px 9px; border-radius:20px; white-space:nowrap; color:var(--white); background:rgba(255,255,255,0.15); }
.pill-freq.Semanal   { background:rgba(29,158,117,0.45); }
.pill-freq.Quincenal { background:rgba(186,117,23,0.6); }
.pill-freq.Mensual   { background:rgba(255,255,255,0.18); }
.freshness { width:6px; height:6px; border-radius:50%; display:inline-block; }
.f-ok   { background:#4ade80; }
.f-warn { background:#fb923c; }
.f-na   { background:rgba(255,255,255,0.4); }

/* KPIs */
.mc-kpis { display:grid; grid-template-columns:1fr 1fr; }
.mc-kpi { padding:12px 14px; border-right:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.mc-kpi:nth-child(even) { border-right:none; }
.mc-kpi:nth-child(n+3) { border-top:1px solid var(--border); }
.mc-kpi-icon { width:38px; height:38px; object-fit:contain; flex-shrink:0; }
.mc-kpi-val { font-size:22px; font-weight:700; color:var(--text); line-height:1.15; }
.mc-kpi-lbl { font-size:11px; color:var(--text-3); margin-top:2px; }
.mc-body { padding:14px 15px; }
.mc-desc {  font-size: 12px;  color: var(--text-2);  background: #F0F9F5;  border-left: 3px solid var(--teal);  padding: 8px 12px;  border-radius: 0 6px 6px 0;}
.mc-links { padding:10px 12px; display:flex; flex-wrap:wrap; gap:7px; border-top:1px solid var(--border); }
.mc-btn { font-size:12px; font-weight:600; padding:6px 14px; border-radius:20px; border:1px solid var(--border); color:var(--text-2); cursor:pointer; background:var(--bg); font-family:var(--sans); text-decoration:none; display:inline-block; transition:background .12s, color .12s; }
.mc-btn:hover { background:var(--navy); color:var(--white); border-color:var(--navy); }
.mc-btn.primary { background:var(--teal); color:var(--white); border-color:var(--teal); }
.mc-btn.primary:hover { background:var(--teal-dk); border-color:var(--teal-dk); }
.mc-btn.disabled { opacity:.5; cursor:default; pointer-events:none; }

/* Loading */
.hub-loading { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-3); padding:20px 0; }
.spin { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Debug box */
.debug-box { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:12px; font-size:11px; font-family:monospace; color:var(--text-2); margin-top:12px; white-space:pre-wrap; display:none; }

@media (max-width:900px) {
  .module-grid { grid-template-columns:1fr; }
  .topbar { padding:12px 18px; height:auto; }
  .topbar-date { display:none; }
  .main { padding:16px; }
}
</style>
</head>
<body>
<div class="layout">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">
        <img src="mtc.jpg" alt="Logo MTC">
      </div>
      <div>
        <div class="topbar-name">Hub de Herramientas · OGAME</div>
        <div class="topbar-sub">Oficina General de Articulación, Monitoreo, y Evaluación de Impacto · Ministerio de Transportes y Comunicaciones</div>
      </div>
    </div>
    <div class="topbar-date">
      <strong id="topDate">—</strong>
      OGAME · MTC
    </div>
  </header>

  <main class="main" id="mainArea">
    <div class="home-greeting">Bienvenida/o</div>
    <div id="homeLoadingMsg">
      <span class="hub-loading"><span class="spin"></span> Cargando configuración desde Google Sheets…</span>
    </div>
    <div id="homeContent" style="display:none">
      <div class="home-sub">Selecciona una herramienta para acceder a la información.</div>
      <div class="module-grid" id="moduleGrid"></div>
    </div>
    <div class="debug-box" id="debugBox"></div>
  </main>

</div>
<script>
// ── Config ──
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkXT9qu8x5JInu81VZ3BDkQ338o6gix4h4CBRTL7q6UeL7NsWn0MvvRlMA474WwH4xIy0LSlPQT-A7/pub?gid=766760814&single=true&output=tsv';

const PROXIES = [
  u => u,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
];

let DATA = { config:[], links:[], kpis:[] };

document.getElementById('topDate').textContent =
  new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});

// ── Load ──
async function loadSheet() {
  let lastErr = null;
  for (const proxyFn of PROXIES) {
    try {
      const url = proxyFn(SHEET_URL);
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 9000);
      const res = await fetch(url, { cache:'no-store', signal:ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (!text || text.length < 20) throw new Error('Respuesta vacía');
      debug('RAW (primeros 300):\n' + text.substring(0,300));
      parseSheet(text);
      buildUI();
      return;
    } catch(e) {
      lastErr = e;
      debug('Proxy falló: ' + e.message);
    }
  }
  document.getElementById('homeLoadingMsg').innerHTML =
    `<span style="color:#C8102E;font-size:13px;">⚠ No se pudo cargar el Sheet.<br>
    <small>Error: ${lastErr?.message}<br>
    Verifica que el Sheet esté publicado en incógnito.</small></span>`;
}

// ── Parse TSV ──
// Handles \r\n, \r, \n and tab separators robustly
function parseSheet(raw) {
  DATA = { config:[], links:[], kpis:[] };

  // Normalize line endings then split
  const lines = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let mode = null;

  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = line.split('\t').map(c => (c || '').trim());
    const [c1, c2, c3, c4, c5, c6] = cols;

    // Detect section headers
    if (c1 === 'Configuración') { mode = null; continue; }
    if (c1 === 'Enlaces')       { mode = null; continue; }
    if (c1 === 'KPIs')          { mode = null; continue; }

    // Detect column headers to set mode
    if (c1 === 'Sección' && c2 === 'Descripción') { mode = 'config'; continue; }
    if (c1 === 'Sección' && c2 === 'Herramientas') { mode = 'links'; continue; }
    if (c1 === 'Sección' && c2 === 'Variable') { mode = 'kpis'; continue; }

    if (!c1 || !mode) continue;

    if (mode === 'config') DATA.config.push({ seccion:c1, descripcion:c2||'', periodicidad:c3||'No aplica', responsable:c4||'', correo:c5||'', corte:c6||'' });
    if (mode === 'links')  DATA.links.push({ seccion:c1, herramienta:c2||'', url:c3||'' });
    if (mode === 'kpis')   DATA.kpis.push({ seccion:c1, variable:c2||'', valor:c3||'', unidad:c4||'' });
  }

  debug(`Parsed → config:${DATA.config.length} links:${DATA.links.length} kpis:${DATA.kpis.length}`);
}

// ── Build UI ──
function buildUI() {
  document.getElementById('homeLoadingMsg').style.display = 'none';
  document.getElementById('homeContent').style.display = 'block';
  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = '';

  if (DATA.config.length === 0) {
    grid.innerHTML = '<p style="color:#C8102E;font-size:13px;">⚠ Se cargó el Sheet pero no se encontraron datos. Verifica el formato de la hoja.</p>';
    document.getElementById('debugBox').style.display = 'block';
    return;
  }

  const visores   = DATA.config.filter(c => c.seccion !== 'Publicaciones');
  const otros     = DATA.config.filter(c => c.seccion === 'Publicaciones');

  renderGroup('Herramientas', visores, grid);
  if (otros.length) renderGroup('Publicaciones', otros, grid);
}

function renderGroup(label, items, container) {
  if (!items.length) return;
  container.innerHTML += `<div class="section-lbl">${label}</div>`;
  items.forEach((cfg, idx) => {
    const kpis  = DATA.kpis.filter(k => k.seccion === cfg.seccion);
    const links = DATA.links.filter(l => l.seccion === cfg.seccion);
    const fresh = getFreshness(cfg);
    const freqCls = cfg.periodicidad.replace(/\s/g,'');

    const kpiHtml = kpis.length ? `
    <div class="mc-kpis">${kpis.slice(0,4).map(k=>`
      <div class="mc-kpi">
        <img class="mc-kpi-icon" src="${kpiIcon(k.variable)}" alt="" onerror="this.style.display='none'">
        <div><div class="mc-kpi-val">${fmtVal(k.valor,k.unidad)}</div><div class="mc-kpi-lbl">${k.variable}</div></div>
      </div>`).join('')}
      </div>
    <div class="mc-body"><div class="mc-desc">${cfg.descripcion}</div></div>` :
    `<div class="mc-body"><div class="mc-desc">${cfg.descripcion}</div></div>`;

    const linksHtml = links.map(l => {
      const pending = !l.url || l.url.toLowerCase() === 'pendiente';
      const primary = /tablero|visor/i.test(l.herramienta);
      if (pending) return `<span class="mc-btn disabled">${l.herramienta}</span>`;
      return `<a class="mc-btn${primary?' primary':''}" href="${l.url}" target="_blank" rel="noopener">${l.herramienta} ↗</a>`;
    }).join('');

    const showCorte = cfg.corte && cfg.corte !== '';
    const showFreq  = cfg.periodicidad && cfg.periodicidad !== 'No aplica';
    const pillsHtml = (showCorte || showFreq) ? `
      <div class="mc-pills">
        ${showCorte ? `<span class="pill-date"><span class="freshness f-${fresh}"></span>${cfg.corte}</span>` : ''}
        ${showFreq  ? `<span class="pill-freq ${freqCls}">${cfg.periodicidad}</span>` : ''}
      </div>` : '';

    container.innerHTML += `
      <div class="module-card">
        <div class="mc-head">
          <div>
            <div class="mc-title">${cfg.seccion}</div>
            <div class="mc-resp">Responsable: ${cfg.responsable}</div>
            <div class="mc-resp">${cfg.correo}</div>
          </div>
          ${pillsHtml}
        </div>
        ${kpiHtml}
        <div class="mc-links">${linksHtml||'<span style="font-size:11px;color:var(--text-3)">Sin enlaces configurados</span>'}</div>
      </div>`;
  });
}

// ── Helpers ──
function getFreshness(cfg) {
  if (!cfg.corte || cfg.periodicidad === 'No aplica') return 'na';
  const days = { 'Semanal':7, 'Quincenal':15, 'Mensual':31 };
  const limit = days[cfg.periodicidad];
  if (!limit) return 'na';
  // Try parse date like "29-abr-26" or "29/04/2026"
  const parts = cfg.corte.match(/(\d{1,2})[-\/](\w+)[-\/](\d{2,4})/);
  if (!parts) return 'na';
  const months = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const d = parseInt(parts[1]);
  const mRaw = parts[2].toLowerCase();
  const m = months[mRaw] !== undefined ? months[mRaw] : parseInt(mRaw)-1;
  let y = parseInt(parts[3]);
  if (y < 100) y += 2000;
  const corteDate = new Date(y, m, d);
  const diffDays = (Date.now() - corteDate.getTime()) / 86400000;
  return diffDays <= limit ? 'ok' : 'warn';
}
// Iconos!
function kpiIcon(v) { 
  const s = (v||'').toLowerCase();
  if (s.includes('hitos vigentes'))   return 'Total.png';           // primero las específicas
  if (s.includes('hitos culminados')) return 'culminados.png';       // 
  if (s.includes('a/c vigentes'))     return 'vigentes cumplidos.png'; // 
  if (s.includes('culminados'))       return 'vigentes cumplidos.png';
  if (s.includes('hito'))             return 'hito.png';             // genérico al final
  if (s.includes('intervencion'))     return 'intervenciones.png';
  if (s.includes('invers'))           return 'inversion.png';
  if (s.includes('avance'))           return 'avance.png';
  if (s.includes('proyecto'))         return 'proyectos1.png';
  if (s.includes('servicio'))         return 'servicios1.png';
  if (s.includes('acuerdos'))         return 'acuerdos.png';
  return 'avance.png';
}

function fmtVal(val, unit) {
  if (!val) return '—';
  const n = parseFloat(val.toString().replace(',','.'));
  if (isNaN(n)) return val;
  if ((unit||'').toLowerCase().includes('porcentaje')) {
    const pct = n > 1 ? n : n * 100;
    return pct.toFixed(1) + '%';
  }
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return n.toLocaleString('en-US').replace(/,/g, ' ');
  return n.toFixed(n % 1 === 0 ? 0 : 1);
}

function debug(msg) {
  const box = document.getElementById('debugBox');
  box.textContent += msg + '\n';
}

loadSheet();
</script>
</body>
</html>
